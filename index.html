  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css">

  <style>
    .reveal { font-size: 34px; }
    .reveal h1, .reveal h2, .reveal h3 { text-transform: none; letter-spacing: -0.5px; }
    .reveal h1 { font-size: 2em; }
    .reveal h2 { font-size: 1.5em; color: #ff9f1c; }
    .reveal h3 { font-size: 1.1em; color: #2ec4b6; }
    .reveal pre { font-size: 0.42em; box-shadow: none; line-height: 1.35; }
    .reveal pre code { padding: 10px 14px; max-height: 760px; border-radius: 6px; }
    .reveal p { margin: 0.5em 0; }
    .reveal code { color: #ff9f1c; }
    .reveal table { font-size: 0.65em; }
    .reveal table th { color: #2ec4b6; }
    .reveal blockquote { border-left: 4px solid #ff9f1c; background: rgba(255,159,28,0.08); }
    .reveal section img { border: none; box-shadow: none; }
    .reveal .small { font-size: 0.7em; }
    .reveal .muted { color: #888; }
    .reveal ul, .reveal ol { width: 100%; }
    .reveal li { margin: 0.15em 0; }
